name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pip install ruff
      - name: Lint
        run: python -m ruff check athenaeum tests
      - name: Syntax
        run: python -m compileall -q athenaeum tests
      - name: Tests
        run: python -m pytest tests -q
